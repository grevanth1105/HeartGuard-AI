{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-8 col-lg-5">
        <div class="custom-card">
            <h2 class="text-center fw-bold mb-4">Access Portal</h2>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="usernameLogin" name="username" required placeholder="Username">
                    <label for="usernameLogin">Username</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="passwordLogin" name="password" required placeholder="Password">
                    <label for="passwordLogin">Password</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 py-3">Secure Login</button>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted">Need an account? <a href="{{ url_for('signup') }}" class="text-info fw-bold text-decoration-none">Sign Up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
