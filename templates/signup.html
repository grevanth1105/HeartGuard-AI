{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-8 col-lg-5">
        <div class="custom-card">
            <h2 class="text-center fw-bold mb-4">Create Account</h2>
            <form method="POST" action="{{ url_for('signup') }}">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="nameInput" name="name" required placeholder="John Doe">
                    <label for="nameInput">Full Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="usernameInput" name="username" required placeholder="johndoe123">
                    <label for="usernameInput">Username</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="passwordInput" name="password" required placeholder="Password">
                    <label for="passwordInput">Password</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 py-3">Register</button>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-info fw-bold text-decoration-none">Log In</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
